apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: autodeploy
  labels:
    app: nginx-sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-sample-app
  template:
    metadata:
      labels:
        app: nginx-sample-app
    spec:
      containers:
      - name: nginx 
        image: bhatuse2/nginx:ea435db13594d71c90c57bc1cd12828c1f4d4475
        ports:
        - containerPort: 80