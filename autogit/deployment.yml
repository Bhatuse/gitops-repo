apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: autodeploy
  labels:
    app: nginx-sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-sample-app
  template:
    metadata:
      labels:
        app: nginx-sample-app
    spec:
      containers:
      - name: nginx 
        image: bhatuse2/nginx:0420fe5148894319cb574cdf6de957680de9b1f1
        ports:
        - containerPort: 80
